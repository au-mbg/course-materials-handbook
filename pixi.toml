[workspace]
authors = ["Mads-Peter <machri@phys.au.dk>"]
channels = ["conda-forge"]
name = "course-materials-handbook"
platforms = ["osx-arm64", "linux-64", "osx-64", "win-64"]
version = "0.1.0"


[tasks.preview]
cmd = "quarto preview"
cwd = "quarto_site/"
description = "Preview the quarto site"

[tasks.render]
cmd = "quarto render"
cwd = "quarto_site/"
description = "Render the quarto site"

[tasks]

[dependencies]
quarto = ">=1.9.38,<2"
python = "==3.12"

[pypi-dependencies]
jupyter = ">=1.1.1, <2"
