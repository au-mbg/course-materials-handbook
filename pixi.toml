[workspace]
authors = ["Mads-Peter <machri@phys.au.dk>"]
channels = ["conda-forge"]
name = "course-materials-handbook"
platforms = ["osx-arm64", "linux-64", "osx-64", "win-64"]
version = "0.1.0"


[tasks.preview]
cmd = "quarto preview"
cwd = "quarto_site/"
description = "Preview the quarto site"

[tasks.render]
cmd = "quarto render"
cwd = "quarto_site/"
description = "Render the quarto site"


[tasks.clean]
cmd = "rm -rf _site"
cwd = "quarto_site/"
description = "Clean the rendered quarto site"

[tasks.install-tinytex]
cmd = "quarto install tinytex --no-prompt && export PATH=\"$HOME/.TinyTeX/bin/x86_64-linux:$PATH\" && tlmgr install dvisvgm standalone preview"
description = "Install TinyTeX and Manim TeX dependencies for CI"

[tasks]

[dependencies]
quarto = ">=1.9.38,<2"
python = "==3.12"
manim = ">=0.20.1,<0.21"
scipy = ">=1.17.1,<2"
marimo = ">=0.23.9,<0.24"

[pypi-dependencies]
jupyter = ">=1.1.1, <2"
shinylive = ">=0.8.9, <0.9"
plotly = ">=6.7.0, <7"
pandas = ">=3.0.3, <4"
statsmodels = ">=0.14.6, <0.15"
altair = ">=6.1.0, <7"
vega-datasets = ">=0.9.0, <0.10"
ipydatagrid = ">=1.4.0, <2"
py3dmol = ">=2.5.5, <3"
matplotlib = ">=3.10.9, <4"
